CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=70
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_CONN_COLOR_ADVERTISING=7
CONFIG_RGBLED_WIDGET_CONN_COLOR_DISCONNECTED=5

# Enable Bluetooth
CONFIG_ZMK_BLE=y

# Optional but recommended for split keyboards
CONFIG_ZMK_SPLIT_BLE=y

# Disable split mode to use only one half
CONFIG_ZMK_SPLIT=n
